<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VulnGuard — Vulnerability Scanner & Remediation</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js for Doughnut chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            base:    '#0D0F14',
            surface: '#141720',
            card:    '#1A1D26',
            border:  '#252837',
            cyber:   '#00FF87',
            warn:    '#FF6B35',
            danger:  '#FF3E3E',
            caution: '#FFD166',
            info:    '#60A5FA',
            muted:   '#6B7280',
            text:    '#E2E8F0',
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      background-color: #0D0F14;
      font-family: 'Inter', sans-serif;
      color: #E2E8F0;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #141720; }
    ::-webkit-scrollbar-thumb { background: #252837; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #00FF87; }

    /* Glow scan button */
    .scan-btn {
      background: linear-gradient(135deg, #00FF87 0%, #00C9FF 100%);
      color: #0D0F14;
      font-weight: 700;
      letter-spacing: 0.05em;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .scan-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 28px rgba(0,255,135,0.45);
    }
    .scan-btn:active { transform: translateY(0px); }
    .scan-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Pulse ring animation on button */
    @keyframes pulse-ring {
      0%   { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .scan-btn.scanning::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 12px;
      border: 2px solid #00FF87;
      animation: pulse-ring 1s ease-out infinite;
    }

    /* Severity badges */
    .badge-critical { background: rgba(255,62,62,0.15);  color: #FF3E3E;  border: 1px solid rgba(255,62,62,0.35); }
    .badge-high     { background: rgba(255,107,53,0.15); color: #FF6B35;  border: 1px solid rgba(255,107,53,0.35); }
    .badge-medium   { background: rgba(255,209,102,0.15);color: #FFD166;  border: 1px solid rgba(255,209,102,0.35); }
    .badge-low      { background: rgba(96,165,250,0.15); color: #60A5FA;  border: 1px solid rgba(96,165,250,0.35); }

    /* Vuln card left border */
    .vuln-card { border-left: 3px solid transparent; transition: border-color 0.2s, box-shadow 0.2s; }
    .vuln-card.critical { border-left-color: #FF3E3E; }
    .vuln-card.high     { border-left-color: #FF6B35; }
    .vuln-card.medium   { border-left-color: #FFD166; }
    .vuln-card.low      { border-left-color: #60A5FA; }
    .vuln-card:hover    { box-shadow: 0 4px 24px rgba(0,255,135,0.06); }

    /* Fade-in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
    }
    .fade-in-delay-1 { animation-delay: 0.05s; }
    .fade-in-delay-2 { animation-delay: 0.10s; }
    .fade-in-delay-3 { animation-delay: 0.15s; }
    .fade-in-delay-4 { animation-delay: 0.20s; }
    .fade-in-delay-5 { animation-delay: 0.25s; }

    /* Code block inside cards */
    .code-block {
      background: #0D0F14;
      border: 1px solid #252837;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.65;
      overflow-x: auto;
      padding: 14px 16px;
      color: #00FF87;
      position: relative;
    }
    .code-block .comment { color: #4B5563; }
    .code-block .keyword { color: #60A5FA; }
    .code-block .string  { color: #FFD166; }

    /* Textarea */
    .code-input {
      background: #0D0F14;
      border: 1px solid #252837;
      color: #E2E8F0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .code-input:focus {
      outline: none;
      border-color: #00FF87;
      box-shadow: 0 0 0 3px rgba(0,255,135,0.08);
    }

    /* Stats bar */
    .stat-item { border-right: 1px solid #252837; }
    .stat-item:last-child { border-right: none; }

    /* Scan line animation */
    @keyframes scan-line {
      0%   { top: 0%; opacity: 0.8; }
      100% { top: 100%; opacity: 0; }
    }
    .scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 12px;
    }
    .scan-overlay::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00FF87, transparent);
      animation: scan-line 1.5s linear infinite;
    }

    /* Empty state */
    .empty-glow {
      box-shadow: 0 0 60px rgba(0,255,135,0.04);
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: #252837;
      border: 1px solid #333648;
      color: #9CA3AF;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: #2E3347; color: #00FF87; }

    /* Loading dots */
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #0D0F14; animation: dot-bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }

    /* Scrollable results panel */
    #results-panel { overflow-y: auto; max-height: calc(100vh - 220px); }
    #code-panel    { overflow-y: auto; max-height: calc(100vh - 220px); }

    /* Collapse toggle */
    .fix-body { transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; }
    .fix-body.collapsed { max-height: 0; opacity: 0; }
    .fix-body.expanded  { max-height: 1000px; opacity: 1; }
  </style>
</head>
<body class="antialiased">

  <!-- ══════════════ TOP NAV ══════════════ -->
  <header class="sticky top-0 z-50 border-b border-border" style="background: rgba(13,15,20,0.92); backdrop-filter: blur(12px);">
    <div class="max-w-screen-2xl mx-auto px-6 h-14 flex items-center justify-between">

      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg,#00FF87,#00C9FF);">
          <i data-lucide="shield-check" class="w-4 h-4" style="color:#0D0F14;"></i>
        </div>
        <span class="font-bold text-base tracking-tight">VulnGuard</span>
        <span class="text-xs px-2 py-0.5 rounded-full font-mono" style="background:#1A1D26;border:1px solid #252837;color:#6B7280;">v2.4.1</span>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-4">
        <span class="hidden md:flex items-center gap-1.5 text-xs text-muted">
          <span class="w-1.5 h-1.5 rounded-full bg-cyber animate-pulse"></span>
          Engine Online
        </span>
        <button class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg border border-border text-muted hover:text-text hover:border-cyber transition-colors">
          <i data-lucide="settings" class="w-3.5 h-3.5"></i>
          Settings
        </button>
        <button class="flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg border border-border text-muted hover:text-text hover:border-cyber transition-colors">
          <i data-lucide="history" class="w-3.5 h-3.5"></i>
          History
        </button>
      </div>
    </div>
  </header>

  <!-- ══════════════ MAIN LAYOUT ══════════════ -->
  <main class="max-w-screen-2xl mx-auto px-6 py-6">

    <!-- Summary stats bar (hidden until results appear) -->
    <div id="stats-bar" class="hidden mb-5 rounded-xl border border-border fade-in" style="background:#141720;">
      <div class="grid grid-cols-2 md:grid-cols-5 divide-x divide-border">
        <div class="stat-item px-5 py-3 flex flex-col gap-0.5">
          <span class="text-xs text-muted">Total Found</span>
          <span id="stat-total" class="text-xl font-bold text-text font-mono">0</span>
        </div>
        <div class="stat-item px-5 py-3 flex flex-col gap-0.5">
          <span class="text-xs text-muted">Critical</span>
          <span id="stat-critical" class="text-xl font-bold font-mono" style="color:#FF3E3E;">0</span>
        </div>
        <div class="stat-item px-5 py-3 flex flex-col gap-0.5">
          <span class="text-xs text-muted">High</span>
          <span id="stat-high" class="text-xl font-bold font-mono" style="color:#FF6B35;">0</span>
        </div>
        <div class="stat-item px-5 py-3 flex flex-col gap-0.5">
          <span class="text-xs text-muted">Medium</span>
          <span id="stat-medium" class="text-xl font-bold font-mono" style="color:#FFD166;">0</span>
        </div>
        <div class="stat-item px-5 py-3 flex flex-col gap-0.5">
          <span class="text-xs text-muted">Low</span>
          <span id="stat-low" class="text-xl font-bold font-mono" style="color:#60A5FA;">0</span>
        </div>
      </div>
    </div>

    <!-- Two-column grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

      <!-- ═══ LEFT: Code Input Panel ═══ -->
      <div class="flex flex-col gap-4">
        <div class="rounded-2xl border border-border p-5 flex flex-col gap-4" style="background:#141720;">

          <!-- Panel header -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i data-lucide="code-2" class="w-4 h-4 text-cyber"></i>
              <span class="font-semibold text-sm">Code Input</span>
            </div>
            <div class="flex items-center gap-2">
              <!-- Language selector -->
              <select id="lang-select" class="text-xs px-2.5 py-1.5 rounded-lg border border-border text-muted cursor-pointer hover:border-cyber transition-colors" style="background:#1A1D26;">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="php">PHP</option>
                <option value="java">Java</option>
                <option value="sql">SQL</option>
                <option value="auto">Auto-detect</option>
              </select>
              <button id="clear-btn" class="text-xs px-2.5 py-1.5 rounded-lg border border-border text-muted hover:text-danger hover:border-danger transition-colors flex items-center gap-1">
                <i data-lucide="trash-2" class="w-3 h-3"></i>
                Clear
              </button>
            </div>
          </div>

          <!-- Textarea wrapper with scan overlay -->
          <div class="relative flex-1" id="textarea-wrapper">
            <textarea
              id="code-input"
              class="code-input w-full rounded-xl p-4 min-h-72"
              placeholder="# Paste your code here for vulnerability analysis...
# Supports Python, JavaScript, PHP, Java, SQL, and more.

def login(username, password):
    query = 'SELECT * FROM users WHERE user=\'' + username + '\''
    result = db.execute(query)
    ..."
            ></textarea>
            <div class="scan-overlay hidden" id="scan-overlay"></div>
          </div>

          <!-- Scan options row -->
          <div class="flex flex-wrap gap-2 items-center">
            <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
              <input type="checkbox" checked class="accent-cyber w-3 h-3" id="chk-sqli"> SQL Injection
            </label>
            <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
              <input type="checkbox" checked class="accent-cyber w-3 h-3" id="chk-xss"> XSS
            </label>
            <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
              <input type="checkbox" checked class="accent-cyber w-3 h-3" id="chk-auth"> Auth Issues
            </label>
            <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
              <input type="checkbox" checked class="accent-cyber w-3 h-3" id="chk-crypto"> Crypto Flaws
            </label>
            <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none">
              <input type="checkbox" checked class="accent-cyber w-3 h-3" id="chk-idor"> IDOR
            </label>
          </div>

          <!-- Scan button -->
          <button id="scan-btn" class="scan-btn w-full py-3.5 rounded-xl text-sm flex items-center justify-center gap-2.5">
            <i data-lucide="scan" class="w-4 h-4" id="scan-icon"></i>
            <span id="scan-label">Scan for Vulnerabilities</span>
            <div id="scan-dots" class="hidden flex gap-1 ml-1">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
          </button>

        </div>

        <!-- Doughnut chart (visible after results) -->
        <div id="chart-card" class="hidden rounded-2xl border border-border p-5 fade-in" style="background:#141720;">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <i data-lucide="pie-chart" class="w-4 h-4 text-cyber"></i>
              <span class="font-semibold text-sm">Severity Distribution</span>
            </div>
            <span class="text-xs text-muted">Scan complete</span>
          </div>
          <div class="flex items-center gap-6">
            <div class="relative w-36 h-36 flex-shrink-0">
              <canvas id="severity-chart"></canvas>
              <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <span id="chart-total" class="text-2xl font-bold font-mono text-text">0</span>
                <span class="text-xs text-muted">total</span>
              </div>
            </div>
            <div id="chart-legend" class="flex flex-col gap-2 text-xs flex-1"></div>
          </div>
        </div>
      </div>

      <!-- ═══ RIGHT: Results Panel ═══ -->
      <div class="flex flex-col gap-4">

        <!-- Results header -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i data-lucide="alert-triangle" class="w-4 h-4 text-warn"></i>
            <span class="font-semibold text-sm">Findings & Remediation</span>
          </div>
          <div class="flex items-center gap-2" id="filter-row">
            <!-- severity filter buttons injected here -->
          </div>
        </div>

        <!-- Results area -->
        <div id="results-panel" class="flex flex-col gap-3 pr-1">

          <!-- Empty state -->
          <div id="empty-state" class="empty-glow rounded-2xl border border-border p-10 flex flex-col items-center justify-center text-center gap-4" style="background:#141720; min-height: 320px;">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background:#1A1D26; border: 1px dashed #252837;">
              <i data-lucide="shield" class="w-8 h-8 text-border"></i>
            </div>
            <div>
              <p class="font-medium text-text mb-1">No vulnerabilities found yet</p>
              <p class="text-sm text-muted max-w-xs">Paste your code in the left panel and click <em>Scan</em> to begin analysis. Results will appear here.</p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- ══════════════ SCRIPTS ══════════════ -->
  <script>
    // ── Init Lucide ──────────────────────────────────────────────
    lucide.createIcons();

    // ── State ────────────────────────────────────────────────────
    let chartInstance = null;
    let activeFilter  = 'all';
    let lastResults   = [];

    // ── DOM refs ─────────────────────────────────────────────────
    const scanBtn       = document.getElementById('scan-btn');
    const scanLabel     = document.getElementById('scan-label');
    const scanDots      = document.getElementById('scan-dots');
    const scanIcon      = document.getElementById('scan-icon');
    const scanOverlay   = document.getElementById('scan-overlay');
    const codeInput     = document.getElementById('code-input');
    const resultsPanel  = document.getElementById('results-panel');
    const emptyState    = document.getElementById('empty-state');
    const statsBar      = document.getElementById('stats-bar');
    const chartCard     = document.getElementById('chart-card');
    const clearBtn      = document.getElementById('clear-btn');
    const filterRow     = document.getElementById('filter-row');

    // ── Severity config ──────────────────────────────────────────
    const severityConfig = {
      critical: { label: 'Critical', color: '#FF3E3E', bg: 'rgba(255,62,62,0.08)',  cls: 'badge-critical' },
      high:     { label: 'High',     color: '#FF6B35', bg: 'rgba(255,107,53,0.08)', cls: 'badge-high'     },
      medium:   { label: 'Medium',   color: '#FFD166', bg: 'rgba(255,209,102,0.08)',cls: 'badge-medium'   },
      low:      { label: 'Low',      color: '#60A5FA', bg: 'rgba(96,165,250,0.08)', cls: 'badge-low'      },
    };

    // ── Clear button ─────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      codeInput.value = '';
      codeInput.focus();
    });

    // ── Scan button ──────────────────────────────────────────────
    scanBtn.addEventListener('click', async () => {
      const code = codeInput.value.trim();
      if (!code) {
        codeInput.focus();
        codeInput.style.borderColor = '#FF3E3E';
        setTimeout(() => codeInput.style.borderColor = '#252837', 1500);
        return;
      }

      // UI → loading state
      setLoading(true);

      try {
        // ── Flask endpoint ──────────────────────────────────────
        // Replace '/api/scan' with your actual Flask route.
        // The response must be JSON with this shape:
        // { vulnerabilities: [ { title, severity, description, fix_code, fix_explanation, line? } ] }
        const resp = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code:     code,
            language: document.getElementById('lang-select').value,
            checks: {
              sqli:   document.getElementById('chk-sqli').checked,
              xss:    document.getElementById('chk-xss').checked,
              auth:   document.getElementById('chk-auth').checked,
              crypto: document.getElementById('chk-crypto').checked,
              idor:   document.getElementById('chk-idor').checked,
            }
          })
        });

        if (!resp.ok) throw new Error('Server error ' + resp.status);
        const data = await resp.json();
        renderResults(data.vulnerabilities || []);

      } catch (err) {
        // ── Demo fallback (remove in production) ─────────────────
        console.warn('Flask not available, rendering demo data:', err.message);
        renderResults(getDemoData());
      }

      setLoading(false);
    });

    // ── setLoading ───────────────────────────────────────────────
    function setLoading(on) {
      if (on) {
        scanBtn.disabled = true;
        scanBtn.classList.add('scanning');
        scanLabel.classList.add('hidden');
        scanDots.classList.remove('hidden');
        scanOverlay.classList.remove('hidden');
        scanIcon.classList.add('hidden');
      } else {
        scanBtn.disabled = false;
        scanBtn.classList.remove('scanning');
        scanLabel.classList.remove('hidden');
        scanDots.classList.add('hidden');
        scanOverlay.classList.add('hidden');
        scanIcon.classList.remove('hidden');
      }
    }

    // ── renderResults ────────────────────────────────────────────
    function renderResults(vulns) {
      lastResults = vulns;
      activeFilter = 'all';

      // Counts
      const counts = { critical: 0, high: 0, medium: 0, low: 0 };
      vulns.forEach(v => { if (counts[v.severity] !== undefined) counts[v.severity]++; });
      const total = vulns.length;

      // Stats bar
      statsBar.classList.remove('hidden');
      document.getElementById('stat-total').textContent    = total;
      document.getElementById('stat-critical').textContent = counts.critical;
      document.getElementById('stat-high').textContent     = counts.high;
      document.getElementById('stat-medium').textContent   = counts.medium;
      document.getElementById('stat-low').textContent      = counts.low;

      // Chart
      renderChart(counts, total);

      // Filter buttons
      renderFilterButtons(counts);

      // Cards
      renderCards(vulns);
    }

    // ── renderCards ──────────────────────────────────────────────
    function renderCards(vulns) {
      // Remove old cards, keep empty state hidden
      const old = resultsPanel.querySelectorAll('.vuln-card-wrap');
      old.forEach(el => el.remove());

      if (vulns.length === 0) {
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');

      const filtered = activeFilter === 'all' ? vulns : vulns.filter(v => v.severity === activeFilter);

      if (filtered.length === 0) {
        const msg = document.createElement('div');
        msg.className = 'vuln-card-wrap text-center py-8 text-sm text-muted';
        msg.textContent = 'No ' + activeFilter + ' severity findings.';
        resultsPanel.appendChild(msg);
        return;
      }

      filtered.forEach((v, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'vuln-card-wrap fade-in fade-in-delay-' + Math.min(i + 1, 5);
        wrap.innerHTML = buildCard(v, i);
        resultsPanel.appendChild(wrap);
      });

      lucide.createIcons();

      // Attach collapse toggles
      document.querySelectorAll('.fix-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.target;
          const body = document.getElementById(id);
          const icon = btn.querySelector('.toggle-icon');
          if (body.classList.contains('collapsed')) {
            body.classList.replace('collapsed', 'expanded');
            icon.style.transform = 'rotate(180deg)';
          } else {
            body.classList.replace('expanded', 'collapsed');
            icon.style.transform = 'rotate(0deg)';
          }
        });
      });

      // Copy buttons
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.nextElementSibling.textContent;
          navigator.clipboard.writeText(code).then(() => {
            btn.textContent = 'Copied!';
            btn.style.color = '#00FF87';
            setTimeout(() => {
              btn.textContent = 'Copy';
              btn.style.color = '';
            }, 1500);
          });
        });
      });
    }

    // ── buildCard ────────────────────────────────────────────────
    function buildCard(v, idx) {
      const sev  = severityConfig[v.severity] || severityConfig.low;
      const fixId = 'fix-body-' + idx;
      return `
        <div class="vuln-card ${v.severity} rounded-xl border border-border p-4 flex flex-col gap-3" style="background:#141720;">
          <!-- Card header -->
          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-2.5 flex-1 min-w-0">
              <div class="w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center" style="background:${sev.bg};">
                <i data-lucide="bug" class="w-4 h-4" style="color:${sev.color};"></i>
              </div>
              <div class="min-w-0">
                <p class="font-semibold text-sm text-text leading-snug truncate">${escHtml(v.title)}</p>
                ${v.line ? '<p class="text-xs text-muted font-mono">Line ' + v.line + '</p>' : ''}
              </div>
            </div>
            <span class="flex-shrink-0 text-xs px-2.5 py-1 rounded-full font-semibold ${sev.cls}">${sev.label}</span>
          </div>

          <!-- Description -->
          <p class="text-xs text-muted leading-relaxed">${escHtml(v.description)}</p>

          <!-- Remediation section -->
          <div class="rounded-xl border border-border overflow-hidden" style="background:#0D0F14;">
            <!-- Toggle header -->
            <button class="fix-toggle w-full px-4 py-2.5 flex items-center justify-between text-left" data-target="${fixId}">
              <div class="flex items-center gap-2">
                <i data-lucide="wrench" class="w-3.5 h-3.5 text-cyber"></i>
                <span class="text-xs font-semibold text-cyber">Remediation</span>
              </div>
              <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-muted toggle-icon transition-transform" style="transition: transform 0.3s;"></i>
            </button>

            <!-- Fix body -->
            <div class="fix-body expanded" id="${fixId}">
              <div class="px-4 pb-4 flex flex-col gap-3 border-t border-border" style="border-color:#252837;">
                <!-- Explanation -->
                <p class="text-xs text-muted pt-3 leading-relaxed">${escHtml(v.fix_explanation)}</p>
                <!-- Fixed code -->
                <div class="relative">
                  <button class="copy-btn">Copy</button>
                  <pre class="code-block pt-8">${escHtml(v.fix_code)}</pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ── renderChart ──────────────────────────────────────────────
    function renderChart(counts, total) {
      chartCard.classList.remove('hidden');
      document.getElementById('chart-total').textContent = total;

      const ctx = document.getElementById('severity-chart').getContext('2d');
      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Critical', 'High', 'Medium', 'Low'],
          datasets: [{
            data: [counts.critical, counts.high, counts.medium, counts.low],
            backgroundColor: ['rgba(255,62,62,0.85)', 'rgba(255,107,53,0.85)', 'rgba(255,209,102,0.85)', 'rgba(96,165,250,0.85)'],
            borderColor: '#0D0F14',
            borderWidth: 3,
            hoverOffset: 5,
          }]
        },
        options: {
          cutout: '72%',
          plugins: { legend: { display: false }, tooltip: {
            backgroundColor: '#1A1D26',
            borderColor: '#252837',
            borderWidth: 1,
            titleColor: '#E2E8F0',
            bodyColor: '#9CA3AF',
            padding: 10,
          }},
          animation: { animateRotate: true, duration: 800, easing: 'easeOutQuart' },
        }
      });

      // Legend
      const legend = document.getElementById('chart-legend');
      legend.innerHTML = Object.entries(counts).map(([key, val]) => {
        const s = severityConfig[key];
        const pct = total ? Math.round(val / total * 100) : 0;
        return `
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${s.color};"></span>
              <span class="text-muted">${s.label}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="font-mono font-semibold text-text">${val}</span>
              <span class="text-muted w-8 text-right">${pct}%</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── renderFilterButtons ──────────────────────────────────────
    function renderFilterButtons(counts) {
      filterRow.innerHTML = '';
      const allBtn = buildFilterBtn('all', 'All', lastResults.length, true);
      filterRow.appendChild(allBtn);
      ['critical','high','medium','low'].forEach(sev => {
        filterRow.appendChild(buildFilterBtn(sev, severityConfig[sev].label, counts[sev]));
      });
    }

    function buildFilterBtn(sev, label, count, active = false) {
      const btn = document.createElement('button');
      btn.className = 'text-xs px-2.5 py-1 rounded-lg transition-colors border ' +
        (active ? 'border-cyber text-cyber' : 'border-border text-muted hover:text-text hover:border-border');
      btn.style.background = active ? 'rgba(0,255,135,0.08)' : '#1A1D26';
      btn.dataset.filter = sev;
      btn.textContent = label + ' (' + count + ')';
      btn.addEventListener('click', () => {
        activeFilter = sev;
        document.querySelectorAll('#filter-row button').forEach(b => {
          const isActive = b.dataset.filter === sev;
          b.className = 'text-xs px-2.5 py-1 rounded-lg transition-colors border ' +
            (isActive ? 'border-cyber text-cyber' : 'border-border text-muted hover:text-text');
          b.style.background = isActive ? 'rgba(0,255,135,0.08)' : '#1A1D26';
        });
        renderCards(lastResults);
      });
      return btn;
    }

    // ── Helpers ──────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Demo data (remove in production) ────────────────────────
    function getDemoData() {
      return [
        {
          title: 'SQL Injection via String Concatenation',
