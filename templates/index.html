<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SecureCode Pro | فحص الثغرات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-blue-500 mb-2">SecureCode Pro v3.0</h1>
            <p class="text-gray-400">أداة فحص الثغرات الأمنية الذكية</p>
        </header>

        <main class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <textarea id="codeArea" rows="10" class="w-full bg-gray-950 text-green-400 p-4 rounded-xl border border-gray-600 focus:border-blue-500 outline-none" placeholder="ضع الكود البرمجي هنا لفحصه..."></textarea>
            <button onclick="scanCode()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">بدء الفحص الآن</button>
        </main>

        <div id="result" class="mt-8 p-6 bg-gray-800 rounded-2xl border border-gray-700 hidden">
            <h2 class="text-xl font-bold mb-4">نتيجة الفحص:</h2>
            <pre id="output" class="text-gray-300 overflow-x-auto"></pre>
        </div>
    </div>

    <script>
        async function scanCode() {
            const code = document.getElementById('codeArea').value;
            const resDiv = document.getElementById('result');
            const output = document.getElementById('output');
            
            resDiv.classList.remove('hidden');
            output.innerText = "جاري التحليل...";

            const response = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ code: code })
            });
            const data = await response.json();
            output.innerText = data.result || "لا توجد ثغرات تم العثور عليها.";
        }
    </script>
</body>
</html>
