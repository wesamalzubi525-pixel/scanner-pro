<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0c10; color: #f1f5f9; }
        .glass-card { background: #141820; border: 1px solid #1e2535; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-64 glass-card p-6 flex flex-col">
        <h2 class="text-xl font-bold text-blue-500 mb-8">SecureCode Pro</h2>
        <nav class="space-y-4">
            <div class="text-blue-400 font-bold bg-blue-900/20 p-2 rounded">لوحة التحكم</div>
            <div class="text-gray-400">فحص الكود</div>
            <div class="text-gray-400">الثغرات</div>
            <div class="text-gray-400">التقارير</div>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-8">لوحة التحكم</h1>
        
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">إجمالي الفحوصات</p>
                <p class="text-3xl font-bold mt-2">1,284</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">ثغرات حرجة</p>
                <p class="text-3xl font-bold mt-2 text-red-500">23</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">ثغرات مصلحة</p>
                <p class="text-3xl font-bold mt-2 text-green-500">198</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">درجة الأمان</p>
                <p class="text-3xl font-bold mt-2 text-purple-500">74/100</p>
            </div>
        </div>

        <div class="glass-card p-8 rounded-2xl">
            <h2 class="text-lg font-bold mb-4">فحص الكود البرمجي</h2>
            <textarea id="code" class="w-full h-40 bg-black p-4 rounded-xl border border-gray-700 text-green-400 font-mono focus:ring-2 focus:ring-blue-500"></textarea>
            <button class="mt-4 bg-blue-600 px-6 py-2 rounded-lg font-bold hover:bg-blue-500">بدء الفحص</button>
        </div>
    </main>

</body>
</html>
